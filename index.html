<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-GA.working</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="mainNav" class="navbar navbar-expand-lg navbar-dark bg-dark hidden">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">E-GA.working</a>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div id="loginPage" class="mx-auto" style="max-width: 400px; margin-top: 50px;">
      <div class="card p-4 text-center border-top border-primary border-4 mb-4 login-card">
        <div class="logo-wrapper">
          <img src="e-galogo.png" alt="E-GA Logo" class="logo-img">
        </div>

        <h2 class="mb-1 fw-bold text-primary">E-GA.working</h2>
        <p class="text-muted small mb-4">สำหรับเช็คเวลาการมาช่วยงานต่างๆ</p>

        <div class="mb-3">
          <input type="text" id="username" class="form-control custom-input" placeholder="ชื่อผู้ใช้งาน">
        </div>

        <div class="mb-3">
          <input type="password" id="password" class="form-control custom-input" placeholder="รหัสผ่าน">
        </div>

        <button class="btn btn-primary w-100 py-2 login-btn" onclick="login()">
          <i class="bi bi-box-arrow-in-right"></i> เข้าสู่ระบบ
        </button>
      </div>

      <div class="card p-3 announcement-box shadow-sm">
        <h6 class="fw-bold text-warning mb-2"><i class="bi bi-megaphone-fill"></i> แผนการทำงานครั้งถัดไป</h6>
        <div id="loginPlanList" class="small text-muted"></div>
      </div>
    </div>

    <div id="adminPage" class="hidden">
      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 mb-3 border-start border-primary border-4">
            <h5 class="fw-bold mb-3 text-primary"><i class="bi bi-gear-fill"></i> จัดการระบบ</h5>

            <ul class="nav nav-tabs mb-3">
              <li class="nav-item"><button class="nav-link active py-1" data-bs-toggle="tab" data-bs-target="#tab-work">ลงงาน</button></li>
              <li class="nav-item"><button class="nav-link py-1" data-bs-toggle="tab" data-bs-target="#tab-emp">พนักงาน</button></li>
              <li class="nav-item"><button class="nav-link py-1" data-bs-toggle="tab" data-bs-target="#tab-plan">แผนงาน</button></li>
            </ul>

            <div class="tab-content pt-2">
              <div class="tab-pane fade show active" id="tab-work">
                <select id="selectEmp" class="form-select mb-2"></select>
                <input type="date" id="workDate" class="form-control mb-2">
                <div class="row g-2 mb-2">
                  <div class="col-6"><input type="time" id="startTime" class="form-control"></div>
                  <div class="col-6"><input type="time" id="endTime" class="form-control"></div>
                </div>
                <div class="row g-2 mb-3">
                  <div class="col-6"><input type="number" id="entryRate" class="form-control" placeholder="เรท/ชม."></div>
                  <div class="col-6"><input type="number" id="entryFund" class="form-control" placeholder="หักกองทุน"></div>
                </div>
                <button class="btn btn-success w-100" onclick="addWorkLog()">บันทึกงาน</button>
              </div>

              <div class="tab-pane fade" id="tab-emp">
                <input type="text" id="empName" class="form-control mb-2" placeholder="ชื่อ-นามสกุล">
                <select id="empBank" class="form-select mb-2">
                  <option value="">-- เลือกธนาคาร --</option>
                  <option value="กสิกรไทย">กสิกรไทย</option>
                  <option value="ไทยพาณิชย์">ไทยพาณิชย์</option>
                  <option value="กรุงเทพ">กรุงเทพ</option>
                  <option value="กรุงไทย">กรุงไทย</option>
                  <option value="กรุงศรีฯ">กรุงศรีฯ</option>
                  <option value="ออมสิน">ออมสิน</option>
                  <option value="ttb">ttb (ทหารไทยธนชาต)</option>
                </select>
                <input type="text" id="empAcc" class="form-control mb-3" placeholder="เลขบัญชี">
                <button class="btn btn-primary w-100" onclick="addEmployee()">บันทึกพนักงาน</button>
              </div>

              <div class="tab-pane fade" id="tab-plan">
                <textarea id="planText" class="form-control mb-2" rows="2" placeholder="เพิ่มแผนงานใหม่..."></textarea>
                <button class="btn btn-warning btn-sm w-100" onclick="addWorkPlan()">ประกาศแผนงาน</button>
                <hr>
                <div id="adminPlanList"></div>
              </div>
            </div>
          </div>

          <div class="card p-3">
            <div id="adminEmpList" class="small"></div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card p-3">
            <h5 class="fw-bold mb-3"><i class="bi bi-table"></i> ประวัติงานและข้อมูลการโอนเงิน</h5>
            <div class="table-responsive">
              <table class="table table-sm small">
                <thead class="table-light">
                  <tr>
                    <th>วันที่ / พนักงาน</th>
                    <th>ธนาคาร / เลขบัญชี</th>
                    <th>ชม.</th>
                    <th>สุทธิ</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th>
                  </tr>
                </thead>
                <tbody id="adminReportBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="userPage" class="hidden">
      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 mb-3 border-top border-primary border-4 text-center">
            <div class="profile-wrapper mb-3" onclick="document.getElementById('profileInput').click()">
              <img id="uProfileImg" src="https://via.placeholder.com/110" class="profile-img">
              <div class="btn-change-photo"><i class="bi bi-camera-fill"></i></div>
              <input type="file" id="profileInput" class="hidden" accept="image/*" onchange="uploadPhoto(this)">
            </div>

            <h4 id="uDisplayName" class="fw-bold">-</h4>

            <div class="mb-3 text-start small border p-2 rounded bg-light">
              <label class="fw-bold text-muted mb-1">ข้อมูลบัญชีรับเงิน:</label>
              <select id="uInputBank" class="form-select form-select-sm mb-2 border-primary shadow-none">
                <option value="">-- เลือกธนาคาร --</option>
                <option value="กสิกรไทย">กสิกรไทย</option>
                <option value="ไทยพาณิชย์">ไทยพาณิชย์</option>
                <option value="กรุงเทพ">กรุงเทพ</option>
                <option value="กรุงไทย">กรุงไทย</option>
                <option value="กรุงศรีฯ">กรุงศรีฯ</option>
                <option value="ออมสิน">ออมสิน</option>
                <option value="ttb">ttb (ทหารไทยธนชาต)</option>
              </select>

              <div class="input-group mb-2">
                <input type="text" id="uInputAcc" class="form-control form-control-sm border-primary shadow-none" placeholder="เลขบัญชี">
                <button class="btn btn-primary btn-sm" onclick="updateUserAccount()">บันทึก</button>
              </div>
            </div>

            <div class="card mb-2 p-2 bg-fund text-white d-flex justify-content-between flex-row summary-card">
              <span>กองทุนสะสม:</span> <span id="uTotalFundAll" class="fw-bold">0</span>
            </div>

            <div class="card mb-2 p-2 bg-primary text-white d-flex justify-content-between flex-row summary-card">
              <span>รายได้รวมทั้งหมด:</span> <span id="uTotalAll" class="fw-bold">0</span>
            </div>

            <div class="card mb-2 p-2 bg-success text-white d-flex justify-content-between flex-row summary-card">
              <span>รายได้รวมที่จ่ายแล้ว:</span> <span id="uTotalPaid" class="fw-bold">0</span>
            </div>

            <div class="card p-2 bg-warning text-dark d-flex justify-content-between flex-row summary-card">
              <span>รายได้ค้างจ่ายรออนุมัติ:</span> <span id="uTotalPending" class="fw-bold">0</span>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div id="monthlyAccordion"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editWorkModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>แก้ไขข้อมูลงาน</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="editLogId">
          <input type="date" id="editDate" class="form-control mb-2">
          <div class="row g-2 mb-2">
            <div class="col-6"><input type="time" id="editStart" class="form-control"></div>
            <div class="col-6"><input type="time" id="editEnd" class="form-control"></div>
          </div>
          <div class="row g-2">
            <div class="col-6"><input type="number" id="editRate" class="form-control"></div>
            <div class="col-6"><input type="number" id="editFund" class="form-control"></div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-primary w-100" onclick="saveEditWork()">บันทึกการแก้ไข</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
